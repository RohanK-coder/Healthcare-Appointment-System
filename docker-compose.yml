services:
  postgres:
    image: postgres:16
    container_name: healthcare-postgres
    environment:
      POSTGRES_DB: healthcare_appointments
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - healthcare_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d healthcare_appointments"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: healthcare-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/healthcare_appointments
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: change-this-secret-to-at-least-32-characters-for-dev-only
      FRONTEND_URL: http://localhost:5173
    ports:
      - "8080:8080"

volumes:
  healthcare_pgdata:
